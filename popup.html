<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { box-sizing: border-box; }
    html, body { 
      width: 100%; 
      min-height: 100vh;
      margin: 0; 
      padding: 0;
    }
    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      width: 100%; 
      padding: 0; 
      background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%); 
      color: white; 
      min-height: 100vh;
    }
    
    .header { padding: 20px 16px; text-align: center; background: linear-gradient(135deg, #4285f4 0%, #34a853 100%); position: relative; overflow: hidden; }
    .header::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%); }
    .header h1 { margin: 0; font-size: 20px; font-weight: 700; position: relative; }
    .header p { margin: 6px 0 0; font-size: 12px; opacity: 0.9; position: relative; }
    
    .status-bar { padding: 12px 16px; background: rgba(0,0,0,0.3); display: flex; align-items: center; gap: 12px; }
    .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #34a853; flex-shrink: 0; }
    .status-dot.searching { animation: pulse 1.5s infinite; background: #fbbc04; }
    .status-dot.error { background: #ea4335; }
    .status-text { font-size: 14px; color: #ccc; }
    
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.9); } }
    
    .content { padding: 16px; }
    
    .mode-toggle { display: flex; background: rgba(255,255,255,0.1); border-radius: 12px; padding: 4px; margin-bottom: 20px; }
    .mode-toggle button { flex: 1; padding: 14px 8px; background: transparent; border: none; border-radius: 10px; color: #888; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.3s; }
    .mode-toggle button.active { background: linear-gradient(135deg, #4285f4, #34a853); color: white; }
    
    .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #888; margin-bottom: 16px; font-weight: 600; }
    
    .device-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .device-card:hover { background: rgba(255,255,255,0.12); transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
    .device-card:active { transform: scale(0.98); }
    .device-card.selected { background: linear-gradient(135deg, rgba(66,133,244,0.25), rgba(52,168,83,0.25)); border-color: #4285f4; box-shadow: 0 0 20px rgba(66,133,244,0.3); }
    
    .device-icon { width: 48px; height: 48px; background: linear-gradient(135deg, #4285f4, #34a853); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 4px 15px rgba(66,133,244,0.4); }
    .device-icon svg { width: 26px; height: 26px; fill: white; }
    .device-info { flex: 1; min-width: 0; }
    .device-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .device-ip { font-size: 12px; color: #999; }
    .device-check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.3s; }
    .device-card.selected .device-check { background: #34a853; border-color: #34a853; }
    .device-check svg { width: 16px; height: 16px; fill: transparent; }
    .device-card.selected .device-check svg { fill: white; }
    
    .btn-scan {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #4285f4, #34a853);
      border: none;
      border-radius: 14px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 15px rgba(66,133,244,0.4);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-scan:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(66,133,244,0.5); }
    .btn-scan:active { transform: scale(0.98); }
    .btn-scan svg { width: 20px; height: 20px; fill: currentColor; }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
    }
    .empty-icon { width: 80px; height: 80px; margin: 0 auto 20px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .empty-icon svg { width: 40px; height: 40px; fill: #555; }
    .empty-state h3 { margin: 0 0 8px; font-size: 18px; color: #777; }
    .empty-state p { margin: 0; font-size: 13px; color: #555; line-height: 1.5; }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #4285f4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .android-section { display: none; }
    .android-section.active { display: block; }
    .input-field { 
      width: 100%; 
      padding: 14px 16px; 
      border-radius: 12px; 
      border: 1px solid rgba(255,255,255,0.2); 
      background: rgba(0,0,0,0.3); 
      color: white; 
      font-size: 16px; 
      margin-bottom: 12px; 
      -webkit-appearance: none;
    }
    .input-field::placeholder { color: #666; }
    .input-field:focus { outline: none; border-color: #4285f4; }
    
    /* Android fullscreen popup support */
    @media (max-width: 400px) {
      body { 
        min-height: 100vh;
        height: auto;
      }
      .header { padding: 16px 12px; }
      .header h1 { font-size: 18px; }
      .content { padding: 12px; }
      .mode-toggle { margin-bottom: 16px; }
      .mode-toggle button { padding: 12px 6px; font-size: 13px; }
      .device-card { padding: 14px; margin-bottom: 10px; }
      .device-icon { width: 44px; height: 44px; }
      .device-icon svg { width: 24px; height: 24px; }
      .btn-scan { padding: 14px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Chromecast Ultimate</h1>
    <p>Cast videos to your TV</p>
  </div>
  
  <div class="status-bar">
    <div id="statusDot" class="status-dot"></div>
    <span id="statusText" class="status-text">Ready to scan</span>
  </div>
  
  <div class="content">
    <div class="mode-toggle">
      <button id="modeStandalone" class="active">Standalone</button>
      <button id="modeAndroid">Android App</button>
    </div>
    
    <div id="standaloneSection">
      <div class="section-title">Select a Device</div>
      
      <div id="loadingState" style="display: none;">
        <div class="loading-spinner"></div>
      </div>
      
      <div id="emptyState" style="display: none;">
        <div class="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
          </div>
          <h3>No Devices Found</h3>
          <p>Make sure your Chromecast is powered on and connected to the same network</p>
        </div>
      </div>
      
      <div id="devicesList"></div>
      
      <button id="scanBtn" class="btn-scan">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        Scan for Devices
      </button>
    </div>
    
    <div id="androidSection" class="android-section">
      <div class="section-title">Connect to Server</div>
      <input type="text" id="serverUrl" class="input-field" placeholder="http://192.168.1.100:5000">
      <button id="connectBtn" class="btn-scan" style="background: linear-gradient(135deg, #34a853, #0f9d58);">
        Connect
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
