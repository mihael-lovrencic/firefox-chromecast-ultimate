<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; width: 380px; padding: 10px; margin: 0; background: #1a1a2e; color: white; }
    h3 { margin: 0 0 10px 0; background: linear-gradient(135deg, #4285f4, #34a853); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    h4 { margin: 10px 0 5px 0; color: #aaa; font-size: 14px; }
    button { padding: 10px; cursor: pointer; background: #4285f4; color: white; border: none; border-radius: 8px; font-weight: bold; transition: all 0.3s; }
    button:hover { background: #3367d6; transform: translateY(-2px); }
    button:disabled { background: #555; cursor: not-allowed; transform: none; }
    .status { font-size: 11px; color: #888; margin-top: 5px; padding: 8px; background: #16213e; border-radius: 4px; }
    .mode-toggle { display: flex; gap: 5px; margin-bottom: 10px; }
    .mode-toggle button { flex: 1; padding: 8px; font-size: 12px; }
    .mode-toggle button.active { background: linear-gradient(135deg, #34a853, #0f9d58); }
    .device-btn { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: linear-gradient(135deg, #4285f4, #34a853); border-radius: 12px; color: white; cursor: pointer; margin: 8px 0; width: 100%; text-align: left; border: none; box-shadow: 0 4px 15px rgba(66, 133, 244, 0.3); transition: all 0.3s; }
    .device-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(66, 133, 244, 0.4); }
    .device-btn.selected { background: linear-gradient(135deg, #34a853, #0f9d58); box-shadow: 0 4px 15px rgba(52, 168, 83, 0.4); }
    .device-btn svg { flex-shrink: 0; }
    .device-btn .device-name { font-weight: bold; font-size: 14px; flex-grow: 1; }
    .device-btn .device-ip { font-size: 11px; opacity: 0.8; }
    hr { margin: 15px 0; border: none; border-top: 1px solid #333; }
    .control-btns { display: flex; gap: 8px; margin: 10px 0; }
    .control-btns button { flex: 1; padding: 10px; font-size: 12px; background: #333; }
    .control-btns button:hover { background: #444; }
    .casting { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    .section { display: none; }
    .section.active { display: block; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 20px; }
    .spinner { width: 30px; height: 30px; border: 3px solid #333; border-top-color: #4285f4; border-radius: 50%; animation: spin 1s linear infinite; }
    .debug-panel { margin-top: 10px; padding: 10px; background: #101827; border: 1px solid #24324d; border-radius: 10px; }
    .debug-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .debug-head h4 { margin: 0; color: #d6e4ff; }
    .debug-head button { padding: 6px 10px; font-size: 11px; background: #243b63; }
    .debug-grid { display: grid; gap: 8px; }
    .debug-item { background: #16213e; border-radius: 8px; padding: 8px; }
    .debug-label { display: block; font-size: 10px; letter-spacing: 0.08em; color: #7ea4dc; text-transform: uppercase; margin-bottom: 4px; }
    .debug-value { font-size: 12px; color: #f4f7fb; word-break: break-word; }
    .debug-value.mono { font-family: Consolas, Monaco, monospace; font-size: 11px; }
    .subtitle-picker { margin-top: 10px; padding: 10px; background: #16213e; border-radius: 10px; }
    .subtitle-picker label { display: block; font-size: 12px; color: #9ab7e0; margin-bottom: 6px; }
    .subtitle-picker select { width: 100%; padding: 9px 10px; border-radius: 8px; border: 1px solid #2c3d5f; background: #0f1728; color: white; }
    .subtitle-picker small { display: block; margin-top: 6px; color: #7f8aa3; font-size: 11px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h3>Chromecast Ultimate</h3>
  <div id="status" class="status">Ready</div>

  <div class="mode-toggle">
    <button id="modeStandalone" class="active">Standalone</button>
    <button id="modeAndroid">Android App</button>
  </div>

  <div id="standaloneSection" class="section active">
    <div id="devicesContainer">
      <div id="loadingIndicator" class="loading">
        <div class="spinner"></div>
      </div>
      <div id="discoveredDevices"></div>
    </div>
    <button id="scanBtn" style="width: 100%; margin-top: 10px; background: linear-gradient(135deg, #4285f4, #34a853);">
      Scan for Chromecasts
    </button>
  </div>

  <div id="androidSection" class="section">
    <label style="color: #aaa; font-size: 12px;">Server URL (Android device IP):</label>
    <input type="text" id="serverUrl" placeholder="http://192.168.1.100:5000" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #16213e; color: white; margin-top: 5px;">
    <button id="connectBtn" style="width: 100%; margin-top: 8px; background: #34a853;">Connect</button>
  </div>

  <hr>

  <button id="scanVideosBtn" style="width: 100%; background: #333;">Find Videos on Page</button>
  <div id="videosList"></div>

  <button id="castCurrentBtn" style="width: 100%; background: linear-gradient(135deg, #fbbc04, #ff6d00); margin-top: 10px;">
    Cast Current Page
  </button>

  <div class="subtitle-picker">
    <label for="subtitleSelect">Subtitle Track</label>
    <select id="subtitleSelect">
      <option value="auto">Auto</option>
      <option value="off">Off</option>
    </select>
    <small id="subtitleHint">No subtitles detected yet.</small>
  </div>

  <div class="debug-panel">
    <div class="debug-head">
      <h4>Capture Debug</h4>
      <button id="refreshDebugBtn">Refresh</button>
    </div>
    <div class="debug-grid">
      <div class="debug-item">
        <span class="debug-label">Page</span>
        <div id="debugTabUrl" class="debug-value mono">-</div>
      </div>
      <div class="debug-item">
        <span class="debug-label">Captured Stream</span>
        <div id="debugMediaUrl" class="debug-value mono">-</div>
      </div>
      <div class="debug-item">
        <span class="debug-label">Proxy Decision</span>
        <div id="debugProxy" class="debug-value">-</div>
      </div>
      <div class="debug-item">
        <span class="debug-label">Captured Headers</span>
        <div id="debugHeaders" class="debug-value mono">-</div>
      </div>
    </div>
  </div>

  <hr>

  <div class="control-btns">
    <button id="playBtn">Play</button>
    <button id="pauseBtn">Pause</button>
    <button id="stopBtn">Stop</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
