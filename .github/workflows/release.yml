name: Build & Release

on:
  push:
    branches:
      - main
    paths:
      - 'manifest.json'
      - 'popup.html'
      - 'popup.js'
      - 'background.js'
      - 'cast-button.js'
      - 'cast-button.css'
      - 'icons/**'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-on-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Build extension
        run: |
          rm -rf web-ext-artifacts
          npx web-ext build --overwrite-dest

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ZIP_FILE=$(ls web-ext-artifacts/*.zip | head -1)
          gh release upload ${{ github.event.release.tag_name }} "$ZIP_FILE" --clobber

  build-on-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Build extension
        run: |
          rm -rf web-ext-artifacts
          npx web-ext build --overwrite-dest

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(grep '"version"' manifest.json | sed 's/.*"version": "\(.*\)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v${{ steps.version.outputs.VERSION }} \
            --title "v${{ steps.version.outputs.VERSION }}" \
            --draft \
            --notes "Extension build v${{ steps.version.outputs.VERSION }}"

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ZIP_FILE=$(ls web-ext-artifacts/*.zip | head -1)
          cp "$ZIP_FILE" "firefox-chromecast-ultimate-v${{ steps.version.outputs.VERSION }}.xpi"
          gh release upload v${{ steps.version.outputs.VERSION }} "firefox-chromecast-ultimate-v${{ steps.version.outputs.VERSION }}.xpi" --clobber
