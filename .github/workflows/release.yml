name: Build & Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Build extension
        run: npx web-ext build

      - name: Find built file
        run: |
          ASSET_FILE=$(ls web-ext-artifacts/*.xpi)
          echo "ASSET_FILE=$ASSET_FILE" >> $GITHUB_ENV

      - name: Upload to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ env.ASSET_FILE }}
          asset_name: firefox-chromecast-ultimate-${{ github.event.release.tag_name }}.xpi
          asset_content_type: application/x-xpinstall
