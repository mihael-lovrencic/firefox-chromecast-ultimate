name: Build & Release

on:
  push:
    branches:
      - main
    paths:
      - 'manifest.json'
      - 'popup.html'
      - 'popup.js'
      - 'background.js'
      - 'cast-button.js'
      - 'cast-button.css'
      - 'icons/**'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-on-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Build extension
        run: npx web-ext build

      - name: Find and rename built file
        run: |
          ZIP_FILE=$(ls web-ext-artifacts/*.zip)
          cp "$ZIP_FILE" "firefox-chromecast-ultimate-${{ github.event.release.tag_name }}.xpi"

      - name: Upload to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: firefox-chromecast-ultimate-${{ github.event.release.tag_name }}.xpi
          asset_name: firefox-chromecast-ultimate-${{ github.event.release.tag_name }}.xpi
          asset_content_type: application/x-xpinstall

  build-on-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Build extension
        run: npx web-ext build

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(grep '"version"' manifest.json | sed 's/.*"version": "\(.*\)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          release_name: v${{ steps.version.outputs.VERSION }}
          draft: true
          prerelease: false

      - name: Find and rename built file
        run: |
          ZIP_FILE=$(ls web-ext-artifacts/*.zip)
          cp "$ZIP_FILE" "firefox-chromecast-ultimate-v${{ steps.version.outputs.VERSION }}.xpi"

      - name: Upload to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: firefox-chromecast-ultimate-v${{ steps.version.outputs.VERSION }}.xpi
          asset_name: firefox-chromecast-ultimate-v${{ steps.version.outputs.VERSION }}.xpi
          asset_content_type: application/x-xpinstall
